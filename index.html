jiang:{n:'江丙坤（已歿）',t:[['t-s','前理事長'],['t-p','國貿幫大老'],['t-b','三三會理事長']],d:'前海基會會長。國貿局長出身。峰會理事長。主導2011-2013年服貿協議談判期間的海基會運作。與陳瑞隆同為中興法商畢業，曾派駐南非。另任三三企業交流會理事長、華聚基金會創會董事長。國貿幫三位大老之一。'},
chen:{n:'陳瑞隆',t:[['t-s','副理事長'],['t-p','國貿幫大老'],['t-b','華聚基金會董事長']],d:'前經濟部長。國貿局長出身。峰會副理事長。2008年政黨輪替前18天任部長期間，投審會與金管會做出「外資買台股單次10%以下免審查」決議。另任華聚產業共同標準推動基金會董事長。國貿幫三位大老之一。歷任國貿局長中，連曾任扁政府時期的經濟部長陳瑞隆，卸任後都被國貿幫延攬出任峰會副理事長。'},
liu:{n:'劉兆玄',t:[['t-s','理事長'],['t-b','中華文化永續基金會']],d:'前行政院長，現任峰會理事長。2022年率團赴中出訪，經民連抗議其「擁抱習近平極權統治」。另主持中華文化永續發展基金會推廣「王道永續指標」。任行政院長時通過開放中資藉FINI來台的政策。'},
yin:{n:'尹啟銘',t:[['t-s','祕書長'],['t-p','第三地中資定義']],d:'前經濟部長，峰會祕書長。2009年主導制定《大陸地區人民來台投資許可辦法》，將第三地中資定義設為「持股三成以上或有控制能力」才算中資。經濟部官僚出身，退休後直接到峰會任職。'},
fan:{n:'范良棟',t:[['t-s','副祕書長'],['t-p','兩大政策決策者'],['t-b','工商協進會祕書長']],d:'前投審會執行祕書，峰會副祕書長。唯一同時參與兩大關鍵決策的人物：(1) 2009年第三地中資定義；(2) 2008年外資買台股10%以下免審查。經民連向監察院陳訴要求彈劾。另任工商協進會祕書長。工總祕書長與工商協進會祕書長固定擔任峰會副祕書長，形成制度化旋轉門。'},

wu:{n:'吳當傑',t:[['t-p','外資免審查決議'],['t-b','金融總會祕書長']],d:'前證期局局長，未任峰會職務。2008年「外資買台股單次10%以下免審查」決議主導者之一。現任台灣金融服務業聯合總會祕書長。與黃天牧為間隔一任的前後證期局局長。'},
zhuo:{n:'卓士昭',t:[['t-p','拆安全閥'],['t-p','服貿主將']],d:'前國貿局長、經濟部常務次長、服貿協議總談判代表，未任峰會職務。2012年將中國從絕大多數戰略性高科技貨品「管制地區」移出，拆掉扁政府的安全閥。媒體稱「服貿、貨貿推手」。國貿局長出身，曾派駐南非。'},
zhang:{n:'張銘斌',t:[['t-p','架空對中投資管制']],d:'投審會執行祕書，橫跨藍綠超過十年。2015年將十二吋（含）以下晶圓鑄造改列對中投資「一般類」，使違法輸出只能罰錢無刑責。目前兼任經濟部投資業務處代理處長、投資台灣事務所執行長、招商投資服務中心執行長，將「審查」與「招商」混為一談。'},
fu:{n:'傅棟成',t:[['t-s','特聘專家'],['t-p','蔡政府國安會諮委']],d:'前陸委會經濟處長、副主委。蔡政府國安會諮詢委員，負責對中經濟安全事務。在中國峰會2016年網頁上被列為台灣峰會「特聘專家」。為蔡總統最核心的兩岸政策幕僚之一。其政治判斷令人疑慮。'},
yang:{n:'楊珍妮',t:[['t-n','國貿幫新世代'],['t-p','總談判代表']],d:'2016年後首任國貿局長。國貿局常任文官出身，曾任駐外人員及經貿談判代表。卸任國貿局長後升任政務委員兼經貿談判辦公室總談判代表。國貿幫新世代的典型晉升路徑代表。'},
chenZQ:{n:'陳正祺',t:[['t-n','國貿幫新世代'],['t-b','外貿協會・中技社董事']],d:'國貿局長出身，卸任後升任經濟部政務次長。同時擔任外貿協會董事與中技社董事，而這兩個官股財團法人正是兩岸企業家峰會的會員。體現國貿幫從政策制定到工商團體的人脈網絡延伸。'},
jiangWR:{n:'江文若',t:[['t-n','國貿幫新世代'],['t-p','副總談判代表']],d:'國貿局長出身，卸任後升任經濟部政務次長兼經貿談判辦公室副總談判代表。國貿幫新世代之一，展現「國貿局長→部長職」的固定晉升管道。'},
liuWL:{n:'劉威廉',t:[['t-n','國貿幫新世代']],d:'現任國貿署長（國貿局改制後）。國貿局常任文官出身，曾任駐外人員及經貿談判代表。尚在任中，未來動向待觀察。四位新世代中唯一尚在國貿署的人。'},
orgs:{n:'三大附屬基金會',t:[['t-b','兩岸共同市場'],['t-b','王道永續指標'],['t-b','兩岸共同標準']],d:'兩岸共同市場基金會（蕭萬長）：「建構兩岸經濟統合」。中華文化永續發展基金會（劉兆玄）：推廣「王道永續指標」。華聚產業共同標準推動基金會（陳瑞隆）：「兩岸共同制定產業標準」。三者合起來就是「書同文、車同軌」，為統一建構基礎結構。'},
gov:{n:'官股財團法人會員',t:[['t-b','工研院'],['t-b','中技社'],['t-b','外貿協會']],d:'工研院（政府全額捐助）、中技社、外貿協會列名峰會會員。陳正祺（經濟部政務次長）同時擔任外貿協會與中技社董事，體現國貿幫的制度性網絡延伸。經民連抗議要求退出：「人民的納稅錢不可以被挪去協助中共搞統戰。」'},
p1:{n:'2009年 第三地中資定義',t:[['t-p','尹啟銘'],['t-p','范良棟'],['t-p','蔡練生鼓吹']],d:'經濟部制定《大陸地區人民來台投資許可辦法》，規定中資繞道第三地來台，持股未達三成且無控制力就不算中資。「綜合持股計算法」使51%×51%=26.01%不到三成而不算中資。蔡政府迄今未改。'},
p2:{n:'2008年 外資買台股免審查',t:[['t-p','陳瑞隆'],['t-p','范良棟'],['t-p','吳當傑']],d:'政黨輪替前18天，投審會與金管會決議：外資買台股「單次」10%以下免投審會審查。分六次每次9%即可取得過半股權不受審查。監察院調查報告指責「核有未當」。'},
p3:{n:'2011-2013年 服貿協議談判',t:[['t-p','蕭萬長'],['t-p','江丙坤'],['t-p','卓士昭']],d:'蕭萬長任「經濟總設計師」、江丙坤任海基會會長、卓士昭為總談判代表。後引發太陽花運動阻止生效。期間卓士昭同步將中國從戰略性高科技貨品管制地區移出。'},
};
function sd(k){const d=D[k],p=document.getElementById('detail');const tags=d.t.map(t=>'<span class="tg '+t[0]+'">'+t[1]+'</span>').join('');p.innerHTML='<h3>'+d.n+'</h3><div style="margin:6px 0">'+tags+'</div><div style="margin-top:6px">'+d.d+'</div>';p.style.display='block';p.scrollIntoView({behavior:'smooth',block:'nearest'});}
